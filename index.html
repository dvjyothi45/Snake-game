<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS EC2 Deployment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#ffd6e8,#ffeaf5,#f8d9ff);
    overflow:hidden;
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.hearts span{
    position:absolute;
    display:block;
    color:#ff5fa2;
    font-size:25px;
    animation:float 10s linear infinite;
    opacity:0.6;
}

.hearts span:nth-child(1){left:10%;animation-delay:0s;}
.hearts span:nth-child(2){left:25%;animation-delay:2s;}
.hearts span:nth-child(3){left:45%;animation-delay:4s;}
.hearts span:nth-child(4){left:65%;animation-delay:1s;}
.hearts span:nth-child(5){left:85%;animation-delay:3s;}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
    }
    100%{
        transform:translateY(-120px) scale(1.2);
    }
}

.card{
    position:relative;
    z-index:1;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);
    padding:45px;
    width:450px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(255,105,180,0.25);
}

h1{
    color:#ff4f95;
    font-size:38px;
    margin-bottom:15px;
}

h2{
    color:#d63384;
    margin-bottom:20px;
}

p{
    color:#555;
    font-size:18px;
    line-height:1.7;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    background:#ff69b4;
    color:white;
    text-decoration:none;
    border-radius:40px;
    font-size:18px;
    transition:0.3s;
}

.button:hover{
    background:#ff3f8b;
    transform:scale(1.08);
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:15px;
}

.cloud{
    font-size:65px;
    margin-bottom:15px;
}
</style>

</head>

<body>

<div class="hearts">
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
</div>

<div class="card">

<div class="cloud">☁️💖</div>

<h1>Hello, AWS!</h1>

<h2>Static Website Successfully Deployed</h2>

<p>
This website is hosted on an
<strong>Amazon EC2 Instance</strong><br>
using the <strong>Nginx Web Server</strong>.
</p>

<a href="#" class="button">Deployment Successful 🎉</a>

<div class="footer">
Made with 💗 by <b>Divya Jyothi</b>
</div>

</div>

</body>
</html>
