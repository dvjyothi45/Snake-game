<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS EC2 Static Website</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            text-align:center;
            width:450px;
        }

        h1{
            color:#0d47a1;
            margin-bottom:15px;
            font-size:36px;
        }

        p{
            color:#555;
            font-size:18px;
            line-height:1.6;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 28px;
            background:#0d6efd;
            color:white;
            text-decoration:none;
            border-radius:30px;
            transition:0.3s;
        }

        .btn:hover{
            background:#084298;
        }

        .footer{
            margin-top:25px;
            font-size:14px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🚀 AWS EC2 Website</h1>

    <p>
        Congratulations!<br>
        This static website is successfully hosted on an
        <strong>Amazon EC2 Instance</strong> using
        <strong>Nginx</strong>.
    </p>

    <a href="#" class="btn">Deployment Successful</a>

    <div class="footer">
        Hosted by Divya Jyothi ❤️
    </div>

</div>

</body>
</html>
